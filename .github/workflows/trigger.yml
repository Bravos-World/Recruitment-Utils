name: Release and Trigger JitPack

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+' # Chạy khi push tag có định dạng số như 1.0.0, 2.1.5...

jobs:
  release-and-trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for Sync
        run: sleep 15

      - name: Trigger JitPack Build
        run: |
          USER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          TAG="${{ github.ref_name }}"
          
          curl -s -L -I "https://jitpack.io/com/github/$USER/$REPO/$TAG/$REPO-$TAG.pom"
          echo "View log: https://jitpack.io/com/github/$USER/$REPO/$TAG/build.log"
          echo "----------------------------------------------------------"